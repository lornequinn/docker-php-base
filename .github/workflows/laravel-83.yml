name: Build laravel-83

on:
  push:
    branches: [main]
    paths:
      - 'laravel-83/**'
  workflow_run:
    workflows: ["Build php-83"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lornequinn/docker/laravel-83

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: versions
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          PHP_VERSION=$(docker run --rm ghcr.io/lornequinn/docker/php-83:latest php -r 'echo PHP_VERSION;')
          echo "php_version=$PHP_VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./laravel-83
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.date }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.php_version }}-${{ steps.versions.outputs.date }}
          labels: |
            org.opencontainers.image.source=https://github.com/lornequinn/docker-php-base
            org.opencontainers.image.description=Laravel-ready PHP 8.3 with nginx, supervisor, and composer
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
