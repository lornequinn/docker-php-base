name: Build php-83

on:
  push:
    branches: [main]
    paths:
      - 'php-83/**'
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if base image unchanged'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lornequinn/docker/php-83
  BASE_IMAGE: php:8.3-fpm-alpine

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check base image digest
        id: check-digest
        run: |
          BASE_DIGEST=$(docker manifest inspect ${{ env.BASE_IMAGE }} -v 2>/dev/null | jq -r '.Descriptor.digest // .[0].Descriptor.digest' || echo "unknown")
          echo "base_digest=$BASE_DIGEST" >> $GITHUB_OUTPUT

          OUR_DIGEST=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -v 2>/dev/null | jq -r '.[0].OCIManifest.config.Labels["base.image.digest"] // "none"' || echo "none")
          echo "our_digest=$OUR_DIGEST" >> $GITHUB_OUTPUT

          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          elif [ "$BASE_DIGEST" != "$OUR_DIGEST" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check-digest.outputs.needs_build == 'true' || github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.check-digest.outputs.needs_build == 'true' || github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check-digest.outputs.needs_build == 'true' || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        if: steps.check-digest.outputs.needs_build == 'true' || github.event_name == 'push'
        id: versions
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          PHP_VERSION=$(docker run --rm ${{ env.BASE_IMAGE }} php -r 'echo PHP_VERSION;')
          echo "php_version=$PHP_VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.check-digest.outputs.needs_build == 'true' || github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./php-83
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.date }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.php_version }}-${{ steps.versions.outputs.date }}
          labels: |
            org.opencontainers.image.source=https://github.com/lornequinn/docker-php-base
            org.opencontainers.image.description=PHP 8.3 FPM Alpine with compiled Laravel extensions
            org.opencontainers.image.licenses=MIT
            base.image.digest=${{ steps.check-digest.outputs.base_digest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
